<!DOCTYPE html>
<html>
<head>
    <!-- Syntax Highlighting CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>
    
<pre><div id="code-block">Loading PDF...</div></pre>

<div id="adobe-dc-view" style="width: 100vw; height: 90vh;"></div>
<script src="https://documentcloud.adobe.com/view-sdk/main.js"></script>
<script type="text/javascript">
	const params = new URLSearchParams(window.location.search);
	const codeBlock = document.getElementById("code-block");
	const URL = params.get("url");
	const VIEW_MODE = params.get("view_mode") ?? "FIT_WIDTH";
	const LEFT_PANEL = params.get("hide_left_panel") == 1 ? false : true;
	const ANNOTATION = params.get("hide_anno") == 1 ? false : true;
	const DOWNLOAD = params.get("hide_download") == 1 ? false : true;
	const PRINT = params.get("hide_print") == 1 ? false : true;
	const FILE_ID = params.get("id");
	
	if (FILE_ID) {
	  const getFilePromiseOld = (fileId) => {
	    const driveURL = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=AIzaSyBJWYfNc4iNg2rbnGzYzaUBY5HZzFtjdho`;
	    return fetch(driveURL).then((response) => {
	      if (!response.ok) throw new Error("Failed to fetch file");
	      return response.arrayBuffer();
	    });
	  };
	  const getFilePromiseOld2 = (fileId) => {
    // Point to your Make webhook
    const webhookURL = `https://hook.eu1.make.com/aa4r2j2p7qa84poatu3xng9dly2qdas5?id=${fileId}`;
    
    return fetch(webhookURL).then((response) => {
        if (!response.ok) throw new Error("Failed to fetch file from Make");
        // Adobe expects an ArrayBuffer
        return response.arrayBuffer();
    });
};
const getFilePromiseOld3 = (fileId) => {
    const directURL = `https://drive.google.com/uc?export=download&id=${fileId}`;
    return fetch(directURL).then(response => response.arrayBuffer());
};
const getFilePromise = (fileId) => {
    // Replace this with your new Cloudflare Worker URL
    const workerURL = `https://polished-dust-20f6.thanhvang21121999.workers.dev/?id=${fileId}`;
    
    return fetch(workerURL).then((response) => {
        if (!response.ok) throw new Error("Failed to fetch file from Proxy");
        return response.arrayBuffer();
    });
};

	
	  document.addEventListener("adobe_dc_view_sdk.ready", function () {
	    var adobeDCView = new AdobeDC.View({
	      clientId: "5d38ef5e3853473ca6a7d92bc4249ab5",
	      divId: "adobe-dc-view",
	    });
	    adobeDCView.previewFile(
	      {
	        content: { promise: getFilePromise(FILE_ID) },
	        metaData: { fileName: "document.pdf" },
	      },
	      {
	        // 2. Set the zoom to fit the width
	        defaultViewMode: VIEW_MODE,
	
	        // 3. IMPORTANT: Hide the sidebars to get "Full Screen" feel
	        showLeftHandPanel: LEFT_PANEL,
	        showAnnotationTools: ANNOTATION,
	        showDownloadPDF: DOWNLOAD,
	        showPrintPDF: PRINT,
	      },
	    );
	  });
	  codeBlock.textContent = "";
	} else if (URL) {
	  document.addEventListener("adobe_dc_view_sdk.ready", function () {
	    var adobeDCView = new AdobeDC.View({
	      clientId: "5d38ef5e3853473ca6a7d92bc4249ab5",
	      divId: "adobe-dc-view",
	    });
	    adobeDCView.previewFile(
	      {
	        content: { location: { url: URL } },
	        metaData: { fileName: "document.pdf" },
	      },
	      {
	        // 2. Set the zoom to fit the width
	        defaultViewMode: VIEW_MODE,
	
	        // 3. IMPORTANT: Hide the sidebars to get "Full Screen" feel
	        showLeftHandPanel: LEFT_PANEL,
	        showAnnotationTools: ANNOTATION,
	        showDownloadPDF: DOWNLOAD,
	        showPrintPDF: PRINT,
	      },
	    );
	  });
	  codeBlock.textContent = "";
	} else {
	  codeBlock.textContent = "Invalid URL";
	}
</script>
</body>
</html>
